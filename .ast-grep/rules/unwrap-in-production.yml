id: unwrap-in-production
language: rust
severity: warning
rule:
  all:
    - pattern: "$EXPR.unwrap()"
    - not:
        inside:
          kind: mod_item
          has:
            kind: identifier
            regex: "^tests$"
          stopBy: end
ignores:
  - "tests/**"
  - "**/*test*"
  - "benches/**"
message: ".unwrap() in production code — use ?, .map_err(), or .unwrap_or_default() (coding-standard §4.1)"
note: "Reserve .unwrap() for tests and provably-infallible cases. Inline #[cfg(test)] modules are automatically excluded."
